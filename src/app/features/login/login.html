<section class="login-container">

  <div class="login-card">

    <img
      src="/logo.png"
      alt="Logo de la aplicación"
      class="login-logo"
    />

    <h1>Iniciar sesión</h1>

    <button (click)="login()" [disabled]="loading">

      @if (loading) {
        <span class="spinner"></span>
           Iniciando sesión...
      } @else {
        Iniciar sesión con Google
        }

</button>

  </div>

</section>
